server {
    listen 80;
    server_name 8.145.34.30; # 匹配所有域名，或者写具体的 IP/域名

    # 前端静态文件根目录
    # 注意：这必须与 Dockerfile 中 COPY dist 的目标路径一致
    root /usr/share/nginx/html;
    index index.html;

    # 1. 前端路由 (支持 History 模式)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 2. 后端 API 反向代理 (关键！)
    location /api/ {
        # ✅ 重点：这里使用 Docker Compose 的服务名 "backend"
        # 不要写 localhost 或 127.0.0.1，因为在容器网络中它们指代当前容器自己
        proxy_pass http://smart-kitchen-backend-prod:3001;

        # 传递真实用户信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 可选：增加超时设置，防止大文件或慢请求断开
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # 可选：处理 WebSocket (如果你的 API 需要)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # 3. 安全优化：禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}