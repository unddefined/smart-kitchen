services:
  backend:
    image: crpi-obg02yu23b1k3mun-vpc.cn-wulanchabu.personal.cr.aliyuncs.com/walker-11572/smart-kitchen-backend:latest
    container_name: smart-kitchen-backend-prod
    environment:
      # 使用 ECS 本地 PostgreSQL（而非阿里云 RDS）
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@8.145.34.30:5432/${DB_NAME}
      NODE_ENV: production
      PORT: 3001
    ports:
      - "3001:3001"
    restart: unless-stopped
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 移除独立的 nginx 服务，让前端容器直接暴露 80 端口
  frontend:
    image: crpi-obg02yu23b1k3mun-vpc.cn-wulanchabu.personal.cr.aliyuncs.com/walker-11572/smart-kitchen-frontend:latest
    container_name: smart-kitchen-frontend-prod
    ports:
      - "80:80"  # 直接暴露前端容器的 80 端口
    restart: unless-stopped
    networks:
      - backend-network
    depends_on:
      - backend

networks:
  backend-network:
