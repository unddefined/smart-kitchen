services:
  backend:
    image: ghcr.io/unddefined/smart-kitchen-backend:latest
    container_name: smart-kitchen-backend-prod
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@pgm-2ze353m6093d70a7mo.pg.rds.aliyuncs.com:5432/${DB_NAME}
      NODE_ENV: production
      PORT: 3001
    ports:
      - "3001:3001"
    restart: unless-stopped
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 移除独立的nginx服务，让前端容器直接暴露80端口
  frontend:
    image: ghcr.io/unddefined/smart-kitchen-frontend:latest
    container_name: smart-kitchen-frontend-prod
    ports:
      - "80:80"  # 直接暴露前端容器的80端口
    restart: unless-stopped
    networks:
      - backend-network
    depends_on:
      - backend

networks:
  backend-network: