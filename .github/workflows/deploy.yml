name: Smart Kitchen CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'README.md'
  pull_request:
    branches: [main]

# 赋予必要的权限
permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
jobs:
  # 代码质量检查和构建验证
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Security check - Verify seed script safety
        run: |
          echo "🔍 检查seed脚本安全性..."
          if grep -v "^[[:space:]]*//" ./backend/prisma/seed.ts | grep -E "deleteMany\(\)|truncate|drop table" > /dev/null 2>&1; then
            echo "❌ 危险操作检测到！seed脚本包含未注释的破坏性操作"
            exit 1
          else
            echo "✅ seed脚本安全检查通过"
          fi

      - name: Backend build verification
        working-directory: ./backend
        run: |
          echo "🔍 验证后端构建..."
          npm run build
          if [ -d "dist" ] && [ -f "dist/main.js" ]; then
            echo "✅ 后端构建成功"
          else
            echo "❌ 后端构建失败"
            exit 1
          fi

      - name: Frontend build verification
        working-directory: ./frontend
        run: |
          echo "🔍 验证前端构建..."
          npm run build
          if [ -d "dist" ] && [ -f "dist/index.html" ]; then
            echo "✅ 前端构建成功"
            echo "构建时间: $(date)"
            ls -la dist/
          else
            echo "❌ 前端构建失败"
            exit 1
          fi

      - name: Run linter
        run: |
          cd backend && npm run lint
          cd ../frontend && npm run lint

      - name: Run tests
        run: |
          cd backend && npm run test

  # 构建并推送Docker镜像
  build-and-push-images:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/smart-kitchen-backend
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/smart-kitchen-frontend
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 生产环境部署
  deploy-production:
    needs: build-and-push-images
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Production Deployment Safety Check
        run: |
          echo "🛡️ 生产环境部署安全检查"
          echo "部署分支: ${{ github.ref }}"
          echo "触发者: ${{ github.actor }}"
          echo "提交信息: $(git log -1 --pretty=%B)"
          
          # 检查是否包含重大变更
          CHANGED_FILES=$(git diff --name-only HEAD~1)
          if echo "$CHANGED_FILES" | grep -E "(package-lock.json|Dockerfile|docker-compose)" > /dev/null; then
            echo "⚠️ 检测到基础设施变更，需要额外注意"
          fi

      - name: Deploy to Production Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e  # 遇到错误立即退出
            
            echo "🚀 开始生产环境部署..."
            echo "部署时间: $(date)"
            
            # 登录容器注册表
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            cd /root/smart-kitchen

            # 1. 数据保护 - 创建部署前快照
            echo "📸 创建部署前数据快照..."
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            docker compose exec -T postgres pg_dump -U smart_kitchen smart_kitchen_prod --schema-only > /tmp/db_schema_snapshot_$TIMESTAMP.sql 2>/dev/null || echo "⚠️ 数据库快照创建失败"

            # 2. 检查当前数据状态
            echo "📊 检查当前数据状态..."
            CURRENT_DISH_COUNT=$(docker compose exec -T postgres psql -U smart_kitchen -d smart_kitchen_prod -t -c "SELECT COUNT(*) FROM dishes;" 2>/dev/null || echo "0")
            CURRENT_ORDER_COUNT=$(docker compose exec -T postgres psql -U smart_kitchen -d smart_kitchen_prod -t -c "SELECT COUNT(*) FROM orders;" 2>/dev/null || echo "0")
            echo "当前菜品数量: $CURRENT_DISH_COUNT"
            echo "当前订单数量: $CURRENT_ORDER_COUNT"

            # 3. 同步最新代码
            echo "📥 同步最新代码..."
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            # 4. 更新环境配置
            echo "⚙️ 更新环境配置..."
            if [ -f ".env.production" ]; then
              cp .env.production .env
              echo "✅ 使用生产环境配置"
            else
              echo "⚠️ 未找到生产环境配置文件"
            fi

            # 5. 停止服务但保留数据卷
            echo "⏹️ 停止服务..."
            docker compose down --remove-orphans

            # 6. 拉取最新镜像
            echo "📦 拉取最新镜像..."
            docker compose pull

            # 7. 启动服务
            echo "▶️ 启动服务..."
            docker compose up -d

            # 8. 等待服务启动
            echo "⏳ 等待服务启动..."
            sleep 15

            # 9. 检查容器状态
            echo "📋 检查容器状态..."
            docker compose ps

            # 10. 数据库就绪检查
            echo "🔍 等待数据库就绪..."
            for i in {1..30}; do
              if docker compose exec -T postgres pg_isready -U smart_kitchen > /dev/null 2>&1; then
                echo "✅ 数据库已就绪"
                break
              fi
              echo "等待数据库启动... ($i/30)"
              sleep 2
            done

            # 11. 执行数据库迁移
            echo "🔄 执行数据库迁移..."
            BACKEND_CONTAINER=$(docker compose ps -q backend 2>/dev/null || echo "")
            if [ -n "$BACKEND_CONTAINER" ]; then
              echo "在后端容器上运行迁移..."
              docker compose exec -T backend npx prisma migrate deploy
            else
              echo "❌ 未找到后端容器"
              docker compose ps
              exit 1
            fi

            # 12. 验证数据完整性
            echo "✅ 验证部署后数据状态..."
            NEW_DISH_COUNT=$(docker compose exec -T postgres psql -U smart_kitchen -d smart_kitchen_prod -t -c "SELECT COUNT(*) FROM dishes;" 2>/dev/null || echo "0")
            NEW_ORDER_COUNT=$(docker compose exec -T postgres psql -U smart_kitchen -d smart_kitchen_prod -t -c "SELECT COUNT(*) FROM orders;" 2>/dev/null || echo "0")
            echo "部署后菜品数量: $NEW_DISH_COUNT"
            echo "部署后订单数量: $NEW_ORDER_COUNT"
            
            if [ "$CURRENT_DISH_COUNT" != "$NEW_DISH_COUNT" ]; then
              echo "⚠️ 警告: 菜品数量发生变化 ($CURRENT_DISH_COUNT -> $NEW_DISH_COUNT)"
            fi
            if [ "$CURRENT_ORDER_COUNT" != "$NEW_ORDER_COUNT" ]; then
              echo "⚠️ 警告: 订单数量发生变化 ($CURRENT_ORDER_COUNT -> $NEW_ORDER_COUNT)"
            fi

            # 13. 健康检查
            echo "🏥 执行健康检查..."
            sleep 10
            
            # 后端健康检查
            if curl -f http://localhost:3001/api/health > /dev/null 2>&1; then
              echo "✅ 后端健康检查通过"
            else
              echo "❌ 后端健康检查失败"
              docker compose logs backend --tail 20
              exit 1
            fi
            
            # 前端健康检查
            if curl -f http://localhost > /dev/null 2>&1; then
              echo "✅ 前端健康检查通过"
            else
              echo "❌ 前端健康检查失败"
              docker compose logs frontend --tail 20
              exit 1
            fi
            
            # 14. 验证前端构建时间
            echo "🔍 验证前端部署状态..."
            FRONTEND_CONTAINER=$(docker compose ps -q frontend 2>/dev/null || echo "")
            if [ -n "$FRONTEND_CONTAINER" ]; then
              BUILD_TIME=$(docker exec $FRONTEND_CONTAINER stat -c %Y /usr/share/nginx/html/index.html 2>/dev/null || echo "unknown")
              echo "前端构建时间戳: $BUILD_TIME"
              echo "✅ 部署成功完成！"
            else
              echo "❌ 无法验证前端容器"
              exit 1
            fi

  # 开发环境部署
  deploy-staging:
    needs: build-and-push-images
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: staging

    steps:
      - name: Deploy to Staging Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_SERVER_HOST }}
          username: ${{ secrets.STAGING_SERVER_USER }}
          key: ${{ secrets.STAGING_SERVER_SSH_KEY }}
          port: 22
          script: |
            set -e
            
            echo "🚀 开始开发环境部署..."
            echo "部署时间: $(date)"
            
            cd /root/smart-kitchen-staging

            # 拉取最新代码
            git pull origin develop

            # 更新环境配置
            if [ -f ".env.staging" ]; then
              cp .env.staging .env
            fi

            # 停止旧服务
            docker compose down --remove-orphans

            # 拉取最新镜像
            docker compose pull

            # 启动新服务
            docker compose up -d

            # 等待服务启动
            sleep 15

            # 执行数据库迁移
            docker compose exec backend npx prisma migrate deploy

            # 健康检查
            sleep 10
            curl -f http://localhost:3001/api/health || (echo "❌ 后端健康检查失败"; exit 1)
            curl -f http://localhost || (echo "❌ 前端健康检查失败"; exit 1)
            
            echo "✅ 开发环境部署完成！"

  # 部署通知
  deployment-notification:
    needs: [deploy-production, deploy-staging]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Send deployment notification
        uses: appleboy/telegram-action@v1.0.0
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            🚀 Smart Kitchen 部署状态更新
            
            分支: ${{ github.ref_name }}
            触发者: ${{ github.actor }}
            状态: ${{ job.status }}
            时间: $(date)
            
            ${{ needs.deploy-production.result == 'success' && '✅ 生产环境部署成功' || '' }}
            ${{ needs.deploy-staging.result == 'success' && '✅ 开发环境部署成功' || '' }}
            
            详细信息: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
