name: Smart Kitchen CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'      # 后端代码变动
      - 'frontend/**'     # 前端代码变动
      - 'docker-compose.yml' # 配置变动
      - '.github/workflows/deploy.yml' # 工作流本身变动
      # 忽略文档变动
      # - '!README.md' 
  pull_request:
    branches: [main]

# 【新增】明确赋予 Actions 写入包的权限
permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  # IMAGE_NAME 可以保留，但建议在下面具体步骤中覆盖使用
  IMAGE_NAME: ${{ github.repository }}
jobs:
  # 代码质量检查
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: |
          cd backend && npm ci
          cd ../frontend && npm ci

      - name: Security check - Verify seed script safety
        run: |
          echo "🔍 检查seed脚本安全性..."
          if grep -r "deleteMany()\|truncate\|drop table" ./backend/prisma/seed.ts 2>/dev/null; then
            echo "❌ 危险操作检测到！seed脚本包含破坏性操作"
            exit 1
          else
            echo "✅ seed脚本安全检查通过"
          fi

      - name: Run linter
        run: |
          cd backend && npm run lint
          cd ../frontend && npm run lint

      - name: Run tests
        run: |
          cd backend && npm run test
          # 前端测试（如果有的话）
          # cd ../frontend && npm run test

  # 构建Docker镜像
  build-and-push:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/smart-kitchen-backend
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/smart-kitchen-frontend
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 部署到生产环境
  deploy-production:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Production Data Safety Check
        run: |
          echo "🛡️ 生产环境数据安全检查"
          echo "当前分支: ${{ github.ref }}"
          echo "触发者: ${{ github.actor }}"
          
          # 检查是否包含危险操作
          if git diff --name-only HEAD~1 | grep -E "(seed\.ts|migration)" > /dev/null; then
            echo "⚠️ 检测到可能影响数据的变更，需要额外审查"
          fi

      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            echo "🚀 开始生产环境部署..."
            
            # 0. 登录 GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            cd /root/smart-kitchen

            # 1. 数据保护检查 - 部署前快照
            echo "📸 创建部署前数据快照..."
            docker compose exec -T postgres pg_dump -U smart_kitchen smart_kitchen_prod --schema-only > /tmp/db_schema_snapshot_$(date +%Y%m%d_%H%M%S).sql 2>/dev/null || echo "⚠️ 数据库快照创建失败"

            # 2. 检查当前数据状态
            echo "📊 检查当前数据状态..."
            CURRENT_DISH_COUNT=$(docker compose exec -T postgres psql -U smart_kitchen -d smart_kitchen_prod -t -c "SELECT COUNT(*) FROM dishes;" 2>/dev/null || echo "0")
            echo "当前菜品数量: $CURRENT_DISH_COUNT"

            # 3. 同步代码 (安全方式)
            echo "📥 同步代码..."
            git fetch origin main
            git reset --hard origin/main
            
            # 4. 更新环境变量
            echo "⚙️ 更新环境配置..."
            cp .env.production .env

            # 5. 停止服务但保留数据卷
            echo "⏹️ 停止服务..."
            docker compose down --remove-orphans

            # 6. 拉取新镜像
            echo "📦 拉取新镜像..."
            docker compose pull

            # 7. 启动服务
            echo "▶️ 启动服务..."
            docker compose up -d

            # 8. 等待服务启动
            echo "⏳ 等待服务启动..."
            sleep 10

            # 9. 检查容器状态
            echo "📋 检查容器状态..."
            docker compose ps

            # 10. 数据库就绪检查
            echo "🔍 等待数据库就绪..."
            for i in {1..30}; do
              if docker compose exec -T postgres pg_isready -U smart_kitchen > /dev/null 2>&1; then
                echo "✅ 数据库已就绪"
                break
              fi
              sleep 2
            done

            # 11. 安全的数据库迁移 - 只运行结构变更，不执行seed
            echo "🔄 执行数据库迁移..."
            BACKEND_SERVICE=$(docker compose ps -q backend 2>/dev/null || docker compose ps -q smart-kitchen-backend-prod 2>/dev/null)
            if [ -n "$BACKEND_SERVICE" ]; then
              SERVICE_NAME=$(docker compose ps --format json | jq -r '.[] | select(.Service=="backend" or .Service=="smart-kitchen-backend-prod") | .Service' | head -1)
              echo "在服务 $SERVICE_NAME 上运行迁移..."
              docker compose exec -T $SERVICE_NAME npx prisma migrate deploy
            else
              echo "❌ 未找到后端服务"
              docker compose ps
              exit 1
            fi

            # 12. 验证数据完整性
            echo "✅ 验证部署后数据状态..."
            NEW_DISH_COUNT=$(docker compose exec -T postgres psql -U smart_kitchen -d smart_kitchen_prod -t -c "SELECT COUNT(*) FROM dishes;" 2>/dev/null || echo "0")
            echo "部署后菜品数量: $NEW_DISH_COUNT"
            
            if [ "$CURRENT_DISH_COUNT" != "0" ] && [ "$NEW_DISH_COUNT" != "$CURRENT_DISH_COUNT" ]; then
              echo "⚠️ 警告: 菜品数量发生变化 ($CURRENT_DISH_COUNT -> $NEW_DISH_COUNT)"
              # 不立即退出，但记录警告
            fi

            # 13. 健康检查
            echo "🏥 执行健康检查..."
            sleep 5
            curl -f http://localhost:3001/api/health || (echo "❌ 后端健康检查失败"; docker compose logs backend; exit 1)
            curl -f http://localhost || (echo "❌ 前端健康检查失败"; docker compose logs frontend; exit 1)
                    
            echo "✅ 部署成功完成！"

  # 部署到开发环境
  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: staging

    steps:
      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_SERVER_HOST }}
          username: ${{ secrets.STAGING_SERVER_USER }}
          key: ${{ secrets.STAGING_SERVER_SSH_KEY }}
          port: 22
          script: |
            echo "🚀 开始开发环境部署..."
            
            cd /root/smart-kitchen-staging

            # 拉取最新代码
            git pull origin develop

            # 更新环境变量
            cp .env.staging .env

            # 停止旧服务
            docker compose down

            # 拉取新镜像
            docker compose pull

            # 启动新服务
            docker compose up -d

            # 运行数据库迁移
            docker compose exec backend npx prisma migrate deploy

            # 验证部署
            sleep 10
            curl -f http://localhost:3001/api/health || exit 1
            curl -f http://localhost || exit 1
            
            echo "✅ 开发环境部署完成！前端页面已更新到最新版本！"
