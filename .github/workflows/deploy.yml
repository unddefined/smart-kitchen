name: Smart Kitchen CI/CD Pipeline

on:
  push:
    branches: ["main", "master"]
  # 允许手动触发
  workflow_dispatch:

# 【新增】必须赋予写入包的权限
permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}
          logout: false

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: crpi-obg02yu23b1k3mun.cn-wulanchabu.personal.cr.aliyuncs.com
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}
          logout: false

      # ================================
      # 【新增】设置 Docker Buildx (关键步骤)
      # ================================
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # 创建一个名为 'github-actions' 的构建器实例
          # 它会自动使用 docker-container 驱动，支持 gha 缓存
          driver: docker-container
          buildkitd-flags: --debug

      # ================================
      # 后端构建
      # ================================
      - name: Extract metadata for backend (GHCR)
        id: meta-backend-ghcr
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/smart-kitchen-backend
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract metadata for backend (Aliyun ACR)
        id: meta-backend-acr
        uses: docker/metadata-action@v5
        with:
          images: crpi-obg02yu23b1k3mun.cn-wulanchabu.personal.cr.aliyuncs.com/walker-11572/smart-kitchen-backend
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and Push Backend Image to GHCR
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend-ghcr.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Backend Image to Aliyun ACR
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend-acr.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ================================
      # 【重要】前端构建 - 确保nginx配置被正确打包
      # ================================
      - name: Extract metadata for frontend (GHCR)
        id: meta-frontend-ghcr
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/smart-kitchen-frontend
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract metadata for frontend (Aliyun ACR)
        id: meta-frontend-acr
        uses: docker/metadata-action@v5
        with:
          images: crpi-obg02yu23b1k3mun.cn-wulanchabu.personal.cr.aliyuncs.com/walker-11572/smart-kitchen-frontend
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and Push Frontend Image to GHCR
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend-ghcr.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

          # 【关键】添加构建参数确保配置文件被正确包含
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Build and Push Frontend Image to Aliyun ACR
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend-acr.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

          # 【关键】添加构建参数确保配置文件被正确包含
          build-args: |
            BUILDKIT_INLINE_CACHE=1

  deploy-production:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Production Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 0. 登录 GHCR (以便服务器能拉取私有镜像)
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            echo "13814349230c" | docker login crpi-obg02yu23b1k3mun.cn-wulanchabu.personal.cr.aliyuncs.com -u walker-11572 --password-stdin

            cd /root/smart-kitchen

            # 1. 强制同步代码 (解决 Git 冲突)
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            # 2. 更新环境变量
            if [ -f .env.production ]; then
              cp .env.production .env
            fi

            # 3. 停止并清理旧服务
            docker compose down --remove-orphans

            # 4. 【重要】强制重新拉取最新镜像
            echo "📦 Force pulling latest images..."
            docker compose pull --policy always

            # 5. 启动服务
            echo "🚀 Starting services..."
            docker compose up -d

            # 6. 等待服务就绪
            echo "⏳ Waiting for services..."

            # 6.1 等待数据库
            DB_SERVICE=$(docker compose ps --services | grep postgres | head -n 1)
            for i in {1..30}; do
              if docker compose exec -T $DB_SERVICE pg_isready -U postgres > /dev/null 2>&1; then
                echo "✅ Database ready."
                break
              fi
              sleep 1
            done

            # 6.2 等待后端 API
            BACKEND_SERVICE=$(docker compose ps --services | grep backend | head -n 1)
            echo "Waiting for Backend API ($BACKEND_SERVICE)..."
            for i in {1..60}; do
              if curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/api/health | grep -q "200"; then
                echo "✅ Backend API ready."
                break
              fi
              if [ $i -eq 60 ]; then
                echo "⚠️ Backend health check timeout."
              fi
              sleep 1
            done

            # 7. 运行数据库迁移
            echo "🔄 Running database migrations..."
            if [ -n "$BACKEND_SERVICE" ]; then
              docker compose exec -T $BACKEND_SERVICE npx prisma migrate deploy || echo "⚠️ Migration failed or not needed"
            fi

            # 8. 最终健康检查
            echo "🔍 Final verification..."
            sleep 5
            curl -f http://localhost:3001/api/health || (echo "❌ Backend health check failed"; exit 1)
            curl -f http://localhost || (echo "❌ Frontend health check failed"; exit 1)

            # 9. 【新增】验证nginx配置是否正确加载
            echo "📋 Checking nginx configuration..."
            FRONTEND_CONTAINER=$(docker compose ps --services | grep frontend | head -n 1)
            if [ -n "$FRONTEND_CONTAINER" ]; then
              docker compose exec -T $FRONTEND_CONTAINER nginx -t
              echo "✅ Nginx configuration test passed"
              
              # 显示当前加载的配置
              echo "📄 Current nginx configuration:"
              docker compose exec -T $FRONTEND_CONTAINER cat /etc/nginx/conf.d/default.conf | head -20
            fi

            # 10. 清理悬空镜像，防止磁盘爆满
            echo "🧹 Cleaning up dangling images..."
            docker image prune -f

            echo "🎉 Deployment successful!"
