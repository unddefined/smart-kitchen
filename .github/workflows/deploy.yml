name: Smart Kitchen CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'      # 后端代码变动
      - 'frontend/**'     # 前端代码变动
      - 'docker-compose.yml' # 配置变动
      - '.github/workflows/deploy.yml' # 工作流本身变动
      # 忽略文档变动
      # - '!README.md' 
  pull_request:
    branches: [main]

# 【新增】明确赋予 Actions 写入包的权限
permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  # IMAGE_NAME 可以保留，但建议在下面具体步骤中覆盖使用
  IMAGE_NAME: ${{ github.repository }}
jobs:
  # 代码质量检查
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: |
          cd backend && npm ci
          cd ../frontend && npm ci

      - name: Run linter
        run: |
          cd backend && npm run lint
          cd ../frontend && npm run lint

      - name: Run tests
        run: |
          cd backend && npm run test
          # 前端测试（如果有的话）
          # cd ../frontend && npm run test

  # 构建Docker镜像
  build-and-push:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/smart-kitchen-backend
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/smart-kitchen-frontend
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 部署到生产环境
  deploy-production:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # 0. 登录 GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            cd /root/smart-kitchen

            # 1. 【增强】强制同步代码 (包括删除未追踪文件)
            git fetch origin main
            git reset --hard origin/main
            # 关键：删除所有未追踪的文件和目录 (解决 scripts/ 冲突问题)
            git clean -fd 

            # 2. 更新环境变量
            cp .env.production .env

            # 3. 停止并清理旧服务
            docker compose down --remove-orphans

            # 4. 拉取新镜像 (观察是否有权限错误)
            echo "Pulling images..."
            docker compose pull

            # 5. 启动所有服务
            echo "Starting services..."
            docker compose up -d

            # 6. 【调试】检查容器状态
            echo "Checking container status..."
            docker compose ps

            # 检查后端是否正在运行
            BACKEND_STATUS=$(docker compose ps -q backend 2>/dev/null || docker compose ps -q smart-kitchen-backend-prod 2>/dev/null)
            if [ -z "$BACKEND_STATUS" ]; then
                echo "❌ Backend container is NOT running! Checking logs..."
                # 尝试打印后端日志以便调试
                docker compose logs backend || docker compose logs smart-kitchen-backend-prod
                echo "❌ Deployment failed: Backend did not start."
                exit 1
            fi

            # 7. 等待数据库就绪
            echo "Waiting for database to be ready..."
            for i in {1..30}; do
              if docker compose exec -T postgres pg_isready -U postgres > /dev/null 2>&1; then
                echo "Database is ready!"
                break
              fi
              sleep 1
            done

            # 8. 运行迁移 (自动检测服务名)
            # 优先尝试 'backend'，如果失败则尝试 'smart-kitchen-backend-prod'
            if docker compose ps -q backend > /dev/null 2>&1; then
                SERVICE_NAME="backend"
            elif docker compose ps -q smart-kitchen-backend-prod > /dev/null 2>&1; then
                SERVICE_NAME="smart-kitchen-backend-prod"
            else
                echo "❌ Cannot find backend service name!"
                docker compose ps
                exit 1
            fi

            echo "Running migrations on service: $SERVICE_NAME"
            docker compose exec -T $SERVICE_NAME npx prisma migrate deploy

            # 9. 验证健康检查
            sleep 5
            echo "Verifying deployment..."
            curl -f http://localhost:3001/api/health || (echo "Backend health check failed"; docker compose logs $SERVICE_NAME; exit 1)
            curl -f http://localhost || (echo "Frontend health check failed"; docker compose logs frontend; exit 1)
                    
            echo "✅ Deployment successful!"

  # 部署到开发环境
  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'

    steps:
      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_SERVER_HOST }}
          username: ${{ secrets.STAGING_SERVER_USER }}
          key: ${{ secrets.STAGING_SERVER_SSH_KEY }}
          port: 22
          script: |
            cd /root/smart-kitchen-staging

            # 拉取最新代码
            git pull origin develop

            # 更新环境变量
            cp .env.staging .env

            # 停止旧服务
            docker compose down

            # 拉取新镜像
            docker compose pull

            # 启动新服务
            docker compose up -d

            # 运行数据库迁移
            docker compose exec backend npx prisma migrate deploy

            # 重启后端服务
            docker compose restart backend

            # 验证部署
            sleep 10
            curl -f http://localhost:3001/api/health || exit 1
            curl -f http://localhost || exit 1
